{% extends "base.html" %}

{% block title %}Stars{% endblock %}

{% block content %}
{% if error %}
  <div class="error">{{ error }}</div>
{% endif %}

<div class="content">
  <h3>Looking for a specific star and its observations?</h3>

  <form action="{{ url_for('star.query_star') }}" method="POST">
    <label for="f_starname">Query here:</label>
    <input name="f_starname" id="f_starname" placeholder="Sirius..." type="text">
    <input type="submit">
  </form>
</div>
{% endblock %}
