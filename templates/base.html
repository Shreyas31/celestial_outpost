<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% block title %}Base page{% endblock %}</title>
    <style>
      .navbar {
        background-color: #f5f5f5;
        padding: 10px 20px;
      }

      .navbar a {
        color: #333;
        text-decoration: none;
        margin-right: 20px;
        font-size: 16px;
      }

      .navbar a:hover {
        text-decoration: underline;
      }
    </style>
    {% block style %}{% endblock %}
  </head>
  <body>
    <header>
      <nav class="navbar">
        <!-- Include a logo maybe? -->
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('star.home') }}">Stars</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
