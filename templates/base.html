<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Base page{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300400;700;900&display=swap" rel="stylesheet">
    <style>
      .navbar {
        height: 5vh;
        background-color: #000000;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      }
      .navbar a {
        text-align: center;
        font-size: 18px;
        color: white;
        font-family: 'Noto Serif SC', serif;
        font-weight: 900;
        text-decoration: none;
        line-height: 1;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .navbar a:hover {
        text-decoration: underline;
      }
    </style>
    {% block style %}{% endblock %}
  </head>
  <body>
    <header>
      <nav class="navbar">
          <a href="{{ url_for('home') }}">Home</a>
          <a href="{{ url_for('observation.home') }}">Observations</a>
          <a href="{{ url_for('star.home') }}">Stars</a>
          <a href="{{ url_for('user.home') }}">Users</a>
          <a href="{{ url_for('telescope.home') }}">Telescopes</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
