stages:
  - format
  - deploy

python-formatting:
  stage: format
  image: python:3.12
  before_script:
    - pip install ruff
  script:
    - ruff check app.py

deploy-to-impaas:
  stage: deploy
  needs: ["python-formatting"]
  image: ubuntu:latest
  variables:
    TSURU_TARGET: https://impaas.uk
    APP_NAME: astro-query
  before_script:
    - apt-get update
    - apt-get install -y curl
    - curl -fsSL "https://tsuru.io/get" | bash
    - export TSURU_TOKEN="$IMPAAS_DEPLOY_TOKEN"
    - tsuru env-set PG_URL="$PG_URL" -a "$APP_NAME"
    - tsuru target add impaas "$TSURU_TARGET" -s
  script:
    - tsuru app deploy -a "$APP_NAME" .
  only:
    - main
